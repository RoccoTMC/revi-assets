server {
    listen 80;
    server_name _;

    root /opt/revi-assets/revi-assets/dist;
    index index.html;

    location /api {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /auth {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://localhost:3000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
